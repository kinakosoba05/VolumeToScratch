<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VolumeToScratch</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f4f8; color: #333; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 300px; font-family: monospace; margin-top: 10px; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #4c97ff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        button:hover { background: #337acc; }
        #status { font-weight: bold; color: #ff6600; margin: 10px 0; }
        .setting-item { margin: 15px 0; }
        .setting-item label { font-weight: bold; margin-right: 10px; }
        .setting-item input { padding: 5px; width: 80px; font-size: 16px; border: 1px solid #ccc; border-radius: 3px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Scratchリスト用 音声データ抽出器</h2>
    <p>音声ファイル（mp3やwavなど）を選択すると、音量を0〜100に変換してScratchのリスト形式で出力します。</p>
    
    <div class="setting-item">
        <label for="stepSeconds">一コマの秒数:</label>
        <input type="number" id="stepSeconds" value="0.03" step="0.01" min="0.001"> 秒
    </div>

    <input type="file" id="audioFile" accept="audio/*"><br><br>
    
    <div id="status">ファイルを選択してください</div>
    
    <button id="copyBtn">結果をすべてコピー</button>
    <textarea id="result" placeholder="ここにScratchのリストみたいな数字がずららららっと出ます" readonly></textarea>
</div>

<script>
document.getElementById('audioFile').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const statusDiv = document.getElementById('status');
    const resultTextarea = document.getElementById('result');
    const stepSecondsInput = document.getElementById('stepSeconds');
    
    statusDiv.innerText = "⏳ 音声ファイルを読み込み中...（長い曲は少し時間がかかります）";
    resultTextarea.value = "";

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    
    try {
        const arrayBuffer = await file.arrayBuffer();
        statusDiv.innerText = "⏳ 音声をデコード（解析）中...";
        
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        const channelData = audioBuffer.getChannelData(0); 
        
        statusDiv.innerText = "⏳ Scratch用のデータに変換中...";
        
        const sampleRate = audioBuffer.sampleRate;
        // 入力された秒数を取得（不正な値の場合はデフォルトの0.03秒にする）
        let stepSeconds = parseFloat(stepSecondsInput.value);
        if (isNaN(stepSeconds) || stepSeconds <= 0) {
            stepSeconds = 0.03;
        }
        
        const interval = Math.floor(sampleRate * stepSeconds); 
        
        let output = [];
        for (let i = 0; i < channelData.length; i += interval) {
            let volume = Math.round(Math.abs(channelData[i]) * 100);
            output.push(volume);
        }
        
        resultTextarea.value = output.join('\n');
        statusDiv.innerText = `✅ 完了しました！ （合計 ${output.length} コマのデータ / 一コマ ${stepSeconds} 秒）`;
        
    } catch (err) {
        console.error(err);
        statusDiv.innerText = "❌ エラー：音声ファイルの解析に失敗しました。別のmp3やwavファイルで試してみてください。";
    }
});

document.getElementById('copyBtn').addEventListener('click', () => {
    const textarea = document.getElementById('result');
    if(!textarea.value) {
        alert('まだデータがありません！音声ファイルを選んでね。');
        return;
    }
    textarea.select();
    navigator.clipboard.writeText(textarea.value);
    alert('コピーしました！Scratchのリストの「読み込み」から使ってね！');
});
</script>

</body>
</html>
