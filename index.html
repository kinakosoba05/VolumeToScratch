<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VolumeToScratch</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f7; color: #333; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 650px; margin: 0 auto; text-align: center; }
        .setting-group { text-align: left; background: #f5f7fa; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #ddd; }
        .setting-item { margin: 10px 0; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .setting-item input { width: 100px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: right; font-size: 16px; }
        .btn-start { width: 100%; padding: 14px; background: #4c97ff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-start:hover { background: #337acc; }
        .btn-start:disabled { background: #bdc3c7; cursor: not-allowed; }
        #status { font-weight: bold; margin: 15px 0; }
        .info { text-align: left; background: #e8f4f8; padding: 10px; border-radius: 5px; font-size: 13px; margin: 10px 0; border-left: 4px solid #4c97ff; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔊 Scratch用 音量データ抽出ツール (Auto-Max FPS同期版)</h2>
    <p>パラメータを設定し、音楽ファイルを選択して「開始」を押してください。</p>
    
    <div class="setting-group">
        <strong>⚙️ 解析パラメータ設定</strong>
        <div class="setting-item">
            <label>出力フレームレート (FPS):</label>
            <input type="number" id="paramFPS" value="30" step="1" min="1" max="250">
        </div>
        <div class="setting-item">
            <label>Scratchでの目標の最大高さ:</label>
            <input type="number" id="paramTargetMax" value="100" step="1" min="1">
        </div>
        <div class="setting-item">
            <label>なめらかさ (0〜0.95):</label>
            <input type="number" id="paramSmoothing" value="0.6" step="0.1" min="0" max="0.95">
        </div>
    </div>

    <input type="file" id="audioFile" accept="audio/*"><br>
    
    <button id="startBtn" class="btn-start">音量データを変換してダウンロード</button>
    
    <div id="status" style="color: #333;">ファイルを選択してボタンを押してください</div>
    
    <div class="info">
        ★FPS同期アップデート：秒数指定を排除し、Scratchのタイマーと100%連動するFPSベースに変更しました！曲全体の音量を完全同期で抽出します。
    </div>
</div>

<script>
window.onload = function() {
    const audioFileInput = document.getElementById('audioFile');
    const startBtn = document.getElementById('startBtn');
    const statusDiv = document.getElementById('status');
    
    const paramFPS = document.getElementById('paramFPS');
    const paramTargetMax = document.getElementById('paramTargetMax');
    const paramSmoothing = document.getElementById('paramSmoothing');

    startBtn.addEventListener('click', async function() {
        const file = audioFileInput.files[0];
        
        if (!file) {
            statusDiv.style.color = "#c0392b";
            statusDiv.innerText = "⚠️ エラー：先に音楽ファイルを選んでください！";
            return;
        }

        startBtn.disabled = true;
        statusDiv.style.color = "#ff6600";
        statusDiv.innerText = "⏳ 1/4: ファイルデータを読み込み中...";

        try {
            const loadedArrayBuffer = await file.arrayBuffer();
            const baseFileName = file.name.includes('.') ? file.name.split('.').slice(0, -1).join('.') : file.name;

            statusDiv.innerText = "🔍 2/4: 音声をデコード（解析）中...";

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await audioCtx.decodeAudioData(loadedArrayBuffer.slice(0)); 
            
            statusDiv.innerText = "🔎 3/4: 曲全体の最大音量をスキャン中...";

            // FPSベースに値を修正
            const targetFPS = parseInt(paramFPS.value) || 30;
            let targetMax = parseInt(paramTargetMax.value) || 100;
            let smoothing = parseFloat(paramSmoothing.value) || 0.6;
            
            if (smoothing > 0.95) smoothing = 0.95;
            if (smoothing < 0) smoothing = 0;

            const sampleRate = audioBuffer.sampleRate;
            const channelData = audioBuffer.getChannelData(0); 
            
            // FPS基準で1フレームあたりに進むサンプル数を正確に算出
            const fpsSamples = sampleRate / targetFPS;
            const totalFrames = Math.floor(audioBuffer.length / fpsSamples); 
            
            let rawRmsData = [];
            let globalMaxRms = 0.0001; 

            // 【パス1】丸め誤差を蓄積させないように、各フレーム位置のインデックスから直接サンプル範囲を決める
            for (let f = 0; f < totalFrames; f++) {
                const startSample = Math.floor(f * fpsSamples);
                const endSample = Math.floor((f + 1) * fpsSamples);
                
                let sumSquares = 0;
                let count = 0;
                
                for (let i = startSample; i < endSample && i < channelData.length; i++) {
                    sumSquares += channelData[i] * channelData[i];
                    count++;
                }
                
                let rms = count > 0 ? Math.sqrt(sumSquares / count) : 0;
                rawRmsData.push(rms);
                
                if (rms > globalMaxRms) {
                    globalMaxRms = rms;
                }
            }

            statusDiv.innerText = "⏳ 4/4: Scratch用のデータに自動調整（ノーマライズ）中...";

            let output = [];
            let previousVolume = 0;

            // 【パス2】ノーマライズ処理
            for (let i = 0; i < rawRmsData.length; i++) {
                let normalized = rawRmsData[i] / globalMaxRms;
                let rawVolume = normalized * targetMax;
                
                let smoothedVolume = (rawVolume * (1 - smoothing)) + (previousVolume * smoothing);
                previousVolume = smoothedVolume;

                let finalVolume = Math.min(targetMax, Math.round(smoothedVolume));
                output.push(finalVolume);
            }

            const finalResultText = output.join('\n');

            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const date = now.getDate().toString().padStart(2, '0');
            const timeStr = now.getHours().toString().padStart(2, '0') + 
                            now.getMinutes().toString().padStart(2, '0') + 
                            now.getSeconds().toString().padStart(2, '0');
            
            // ファイル名にFPSを記載するように調整
            const uniqueFileName = `${baseFileName}_Volume_AutoMax${targetMax}_${targetFPS}fps_${year}${month}${date}_${timeStr}.txt`;

            const blob = new Blob([finalResultText], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = uniqueFileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            statusDiv.style.color = "#27ae60";
            statusDiv.innerText = `✅ 変換完了！${targetFPS}FPS用に同期最適化し、[ 合計 ${output.length} コマ ] のデータを保存しました！`;
        } catch (err) {
            console.error(err);
            statusDiv.style.color = "#c0392b";
            statusDiv.innerText = "❌ エラー：音声データの解析に失敗しました。";
        } finally {
            startBtn.disabled = false;
        }
    });
};
</script>

</body>
</html>
